services:
  financial-market-levels:
    build: .
    image: financial-market-levels:local
    container_name: financial-market-levels
    restart: unless-stopped
    user: "${FML_UID:-1000}:${FML_GID:-1000}"
    ports:
      - "8083:8083"
    environment:
      FINANCIAL_MARKET_LEVELS_HOME: /app
      APP_SECRETS_DIR: /run/secrets
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-secret/data/financial-market-levels}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-}
    volumes:
      - ./data:/app/data
      - ./charts:/app/charts
      - ./logs:/app/logs
      - ./secrets:/run/secrets:ro
      - ${FMR_DATA_DIR:-/share/Jose/Projects/FinancialMarketReport/data}:/app/source_data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/healthz', timeout=5).read()"]
      interval: 1m
      timeout: 10s
      retries: 3
    networks:
      - homelab

networks:
  homelab:
    external: true
    name: ${HOMELAB_DOCKER_NETWORK:-homelab}
